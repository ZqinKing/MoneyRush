name: ${COMPOSE_PROJECT_NAME:-moneyrush}

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moneyrush}
      POSTGRES_USER: ${POSTGRES_USER:-moneyrush}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moneyrush}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ../../backend/app/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moneyrush} -d ${POSTGRES_DB:-moneyrush}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - path: ../../.env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      FRONTEND_ORIGIN: http://localhost:${FRONTEND_PORT:-5173}
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
      GOLD_DASHBOARD_CACHE_KEY: ${GOLD_DASHBOARD_CACHE_KEY:-moneyrush:gold:dashboard}
      WS_HEARTBEAT_INTERVAL_SECONDS: ${WS_HEARTBEAT_INTERVAL_SECONDS:-2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/v1/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    env_file:
      - path: ../../.env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
      REDIS_STREAM_KEY: moneyrush:symbol:commands
      ACTIVE_SYMBOLS_KEY: moneyrush:active_symbols
      MARKET_SNAPSHOT_KEY_PREFIX: moneyrush:snapshot
      MARKET_EVENT_KEY_PREFIX: moneyrush:event
      MARKET_EVENTS_STREAM_KEY: moneyrush:market:events
      MARKET_OVERVIEW_CACHE_KEY: moneyrush:market:overview
      # Intraday vendor request intervals, retries, cooldowns, source fallback,
      # and data-quality governance are intentionally managed inside the
      # collector. Do not expose low-level public-data-source rate controls as
      # Compose knobs; users should only toggle product features here.
      COLLECTOR_INTRADAY_HISTORY_ENABLED: ${COLLECTOR_INTRADAY_HISTORY_ENABLED:-true}
      ANOMALY_AGGREGATION_ENABLED: ${ANOMALY_AGGREGATION_ENABLED:-true}
      ANOMALY_POST_CLOSE_REVIEW_ENABLED: ${ANOMALY_POST_CLOSE_REVIEW_ENABLED:-true}
      ANOMALY_POST_CLOSE_REVIEW_START_HOUR_CHINA: ${ANOMALY_POST_CLOSE_REVIEW_START_HOUR_CHINA:-15}
      ANOMALY_POST_CLOSE_REVIEW_START_MINUTE_CHINA: ${ANOMALY_POST_CLOSE_REVIEW_START_MINUTE_CHINA:-15}
      ANOMALY_DRAGON_TIGER_REVIEW_START_HOUR_CHINA: ${ANOMALY_DRAGON_TIGER_REVIEW_START_HOUR_CHINA:-16}
      ANOMALY_DRAGON_TIGER_REVIEW_START_MINUTE_CHINA: ${ANOMALY_DRAGON_TIGER_REVIEW_START_MINUTE_CHINA:-40}
      ANOMALY_POST_CLOSE_BATCH_SIZE: ${ANOMALY_POST_CLOSE_BATCH_SIZE:-20}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  market-overview-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.market_overview_main"]
    environment:
      REDIS_URL: redis://redis:6379/0
      MARKET_OVERVIEW_CACHE_KEY: moneyrush:market:overview
      MARKET_OVERVIEW_COLLECTOR_ENABLED: ${MARKET_OVERVIEW_COLLECTOR_ENABLED:-true}
      MARKET_OVERVIEW_TENCENT_FALLBACK_ENABLED: ${MARKET_OVERVIEW_TENCENT_FALLBACK_ENABLED:-true}
      MARKET_OVERVIEW_LEGU_BREADTH_ENABLED: ${MARKET_OVERVIEW_LEGU_BREADTH_ENABLED:-true}
    depends_on:
      redis:
        condition: service_healthy

  gold-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.gold_main"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      GOLD_DASHBOARD_CACHE_KEY: moneyrush:gold:dashboard
      GOLD_DASHBOARD_COLLECTOR_ENABLED: ${GOLD_DASHBOARD_COLLECTOR_ENABLED:-true}
      GOLD_DASHBOARD_REFRESH_SECONDS: ${GOLD_DASHBOARD_REFRESH_SECONDS:-15}
      GOLD_DASHBOARD_OFFSESSION_REFRESH_SECONDS: ${GOLD_DASHBOARD_OFFSESSION_REFRESH_SECONDS:-60}
      GOLD_AU0_ENABLED: ${GOLD_AU0_ENABLED:-true}
      GOLD_AUTD_ENABLED: ${GOLD_AUTD_ENABLED:-true}
      GOLD_XAU_ENABLED: ${GOLD_XAU_ENABLED:-true}
      GOLD_ETF_ENABLED: ${GOLD_ETF_ENABLED:-true}
      GOLD_AU0_URL: ${GOLD_AU0_URL:-https://hq.sinajs.cn/list=nf_AU0}
      GOLD_XAU_URL: ${GOLD_XAU_URL:-https://hq.sinajs.cn/list=hf_XAU}
      GOLD_ETF_URL: ${GOLD_ETF_URL:-https://qt.gtimg.cn/q=sh518880}
    depends_on:
      redis:
        condition: service_healthy

  global-markets-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.global_markets_main"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      GLOBAL_MARKETS_COLLECTOR_ENABLED: ${GLOBAL_MARKETS_COLLECTOR_ENABLED:-true}
    depends_on:
      redis:
        condition: service_healthy

  content-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.content_main"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
      ACTIVE_SYMBOLS_KEY: moneyrush:active_symbols
      CONTENT_COLLECTOR_ENABLED: ${CONTENT_COLLECTOR_ENABLED:-true}
      CONTENT_REPORT_BACKFILL_DAYS: ${CONTENT_REPORT_BACKFILL_DAYS:-365}
      CONTENT_ANNOUNCEMENT_BACKFILL_PAGES: ${CONTENT_ANNOUNCEMENT_BACKFILL_PAGES:-5}
      CONTENT_NEWS_BACKFILL_MAX_ITEMS: ${CONTENT_NEWS_BACKFILL_MAX_ITEMS:-100}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  dragon-tiger-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.dragon_tiger_main"]
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
      DRAGON_TIGER_COLLECTOR_ENABLED: ${DRAGON_TIGER_COLLECTOR_ENABLED:-true}
      DRAGON_TIGER_COLLECTION_START_HOUR_CHINA: ${DRAGON_TIGER_COLLECTION_START_HOUR_CHINA:-16}
      DRAGON_TIGER_COLLECTION_START_MINUTE_CHINA: ${DRAGON_TIGER_COLLECTION_START_MINUTE_CHINA:-35}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  capital-flow-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.capital_flow_main"]
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
      ACTIVE_SYMBOLS_KEY: moneyrush:active_symbols
      CAPITAL_FLOW_COLLECTOR_ENABLED: ${CAPITAL_FLOW_COLLECTOR_ENABLED:-true}
      CAPITAL_FLOW_COLLECTION_START_HOUR_CHINA: ${CAPITAL_FLOW_COLLECTION_START_HOUR_CHINA:-17}
      CAPITAL_FLOW_COLLECTION_START_MINUTE_CHINA: ${CAPITAL_FLOW_COLLECTION_START_MINUTE_CHINA:-10}
      CAPITAL_FLOW_EASTMONEY_BASE_URL: ${CAPITAL_FLOW_EASTMONEY_BASE_URL:-https://push2his.eastmoney.com/api/qt/stock/fflow/daykline/get}
      CAPITAL_FLOW_AKSHARE_FALLBACK_ENABLED: ${CAPITAL_FLOW_AKSHARE_FALLBACK_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  fund-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.fund_main"]
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
      REDIS_STREAM_KEY: moneyrush:symbol:commands
      ACTIVE_SYMBOLS_KEY: moneyrush:active_symbols
      ACTIVE_FUNDS_KEY: moneyrush:active_funds
      FUND_SNAPSHOT_KEY_PREFIX: moneyrush:fund:snapshot
      FUND_HOLDINGS_KEY_PREFIX: moneyrush:fund
      FUND_AUTO_LINK_STOCKS_KEY_PREFIX: moneyrush:fund:auto_link
      STOCK_FUNDS_KEY_PREFIX: moneyrush:stock
      FUND_COLLECTOR_ENABLED: ${FUND_COLLECTOR_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  macro-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.macro_main"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  event-calendar-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.event_calendar_main"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
      EVENT_CALENDAR_COLLECTOR_ENABLED: ${EVENT_CALENDAR_COLLECTOR_ENABLED:-true}
      EVENT_CALENDAR_LOOKAHEAD_DAYS: ${EVENT_CALENDAR_LOOKAHEAD_DAYS:-370}
      EVENT_CALENDAR_LOOKBACK_DAYS: ${EVENT_CALENDAR_LOOKBACK_DAYS:-45}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    depends_on:
      api:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then(() => process.exit(0)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db-data:
  redis-data:
