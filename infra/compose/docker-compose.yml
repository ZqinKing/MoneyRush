name: ${COMPOSE_PROJECT_NAME:-moneyrush}

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moneyrush}
      POSTGRES_USER: ${POSTGRES_USER:-moneyrush}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moneyrush}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ../../backend/app/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moneyrush} -d ${POSTGRES_DB:-moneyrush}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - path: ../../.env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      FRONTEND_ORIGIN: http://localhost:${FRONTEND_PORT:-5173}
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
      GOLD_DASHBOARD_CACHE_KEY: ${GOLD_DASHBOARD_CACHE_KEY:-moneyrush:gold:dashboard}
      WS_HEARTBEAT_INTERVAL_SECONDS: ${WS_HEARTBEAT_INTERVAL_SECONDS:-2}
      COLLECTOR_INTRADAY_POST_CLOSE_RECONCILIATION_SECONDS: ${COLLECTOR_INTRADAY_POST_CLOSE_RECONCILIATION_SECONDS:-900}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/v1/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    env_file:
      - path: ../../.env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
      REDIS_STREAM_KEY: moneyrush:symbol:commands
      ACTIVE_SYMBOLS_KEY: moneyrush:active_symbols
      MARKET_SNAPSHOT_KEY_PREFIX: moneyrush:snapshot
      MARKET_EVENT_KEY_PREFIX: moneyrush:event
      MARKET_EVENTS_STREAM_KEY: moneyrush:market:events
      MARKET_OVERVIEW_CACHE_KEY: moneyrush:market:overview
      COLLECTOR_POLL_INTERVAL_SECONDS: ${COLLECTOR_POLL_INTERVAL_SECONDS:-5}
      COLLECTOR_SYMBOL_MIN_INTERVAL_SECONDS: ${COLLECTOR_SYMBOL_MIN_INTERVAL_SECONDS:-10}
      COLLECTOR_TENCENT_ENRICHMENT_INTERVAL_SECONDS: ${COLLECTOR_TENCENT_ENRICHMENT_INTERVAL_SECONDS:-600}
      COLLECTOR_VENDOR_FAILURE_COOLDOWN_SECONDS: ${COLLECTOR_VENDOR_FAILURE_COOLDOWN_SECONDS:-60}
      COLLECTOR_INTRADAY_HISTORY_ENABLED: ${COLLECTOR_INTRADAY_HISTORY_ENABLED:-true}
      COLLECTOR_INTRADAY_HISTORY_REFRESH_SECONDS: ${COLLECTOR_INTRADAY_HISTORY_REFRESH_SECONDS:-1800}
      COLLECTOR_INTRADAY_HISTORY_REQUEST_INTERVAL_SECONDS: ${COLLECTOR_INTRADAY_HISTORY_REQUEST_INTERVAL_SECONDS:-8}
      COLLECTOR_INTRADAY_HISTORY_REQUEST_JITTER_SECONDS: ${COLLECTOR_INTRADAY_HISTORY_REQUEST_JITTER_SECONDS:-2}
      COLLECTOR_INTRADAY_HISTORY_VENDOR_COOLDOWN_SECONDS: ${COLLECTOR_INTRADAY_HISTORY_VENDOR_COOLDOWN_SECONDS:-3600}
      COLLECTOR_INTRADAY_POST_CLOSE_RECONCILIATION_SECONDS: ${COLLECTOR_INTRADAY_POST_CLOSE_RECONCILIATION_SECONDS:-900}
      COLLECTOR_ENABLE_RUNTIME_DATA_REPAIR: ${COLLECTOR_ENABLE_RUNTIME_DATA_REPAIR:-false}
      COLLECTOR_VENDOR_PRICE_DIVERGENCE_LIMIT_PCT: ${COLLECTOR_VENDOR_PRICE_DIVERGENCE_LIMIT_PCT:-15}
      ANOMALY_AGGREGATION_ENABLED: ${ANOMALY_AGGREGATION_ENABLED:-true}
      ANOMALY_AGGREGATION_INTERVAL_SECONDS: ${ANOMALY_AGGREGATION_INTERVAL_SECONDS:-300}
      ANOMALY_AI_REASON_ENABLED: ${ANOMALY_AI_REASON_ENABLED:-true}
      ANOMALY_AI_REASON_INTERVAL_SECONDS: ${ANOMALY_AI_REASON_INTERVAL_SECONDS:-300}
      ANOMALY_AI_REASON_BATCH_SIZE: ${ANOMALY_AI_REASON_BATCH_SIZE:-10}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  market-overview-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.market_overview_main"]
    environment:
      REDIS_URL: redis://redis:6379/0
      MARKET_OVERVIEW_CACHE_KEY: moneyrush:market:overview
      MARKET_OVERVIEW_COLLECTOR_ENABLED: ${MARKET_OVERVIEW_COLLECTOR_ENABLED:-true}
      MARKET_OVERVIEW_REFRESH_SECONDS: ${MARKET_OVERVIEW_REFRESH_SECONDS:-30}
      MARKET_OVERVIEW_TENCENT_FALLBACK_ENABLED: ${MARKET_OVERVIEW_TENCENT_FALLBACK_ENABLED:-true}
      MARKET_OVERVIEW_TENCENT_REFRESH_SECONDS: ${MARKET_OVERVIEW_TENCENT_REFRESH_SECONDS:-120}
      MARKET_OVERVIEW_TENCENT_FAILURE_COOLDOWN_SECONDS: ${MARKET_OVERVIEW_TENCENT_FAILURE_COOLDOWN_SECONDS:-180}
      MARKET_OVERVIEW_LEGU_BREADTH_ENABLED: ${MARKET_OVERVIEW_LEGU_BREADTH_ENABLED:-true}
      MARKET_OVERVIEW_LEGU_BREADTH_REFRESH_SECONDS: ${MARKET_OVERVIEW_LEGU_BREADTH_REFRESH_SECONDS:-300}
      MARKET_OVERVIEW_LEGU_BREADTH_TIMEOUT_SECONDS: ${MARKET_OVERVIEW_LEGU_BREADTH_TIMEOUT_SECONDS:-10}
      MARKET_OVERVIEW_LEGU_BREADTH_FAILURE_COOLDOWN_SECONDS: ${MARKET_OVERVIEW_LEGU_BREADTH_FAILURE_COOLDOWN_SECONDS:-600}
    depends_on:
      redis:
        condition: service_healthy

  gold-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.gold_main"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      GOLD_DASHBOARD_CACHE_KEY: moneyrush:gold:dashboard
      GOLD_DASHBOARD_COLLECTOR_ENABLED: ${GOLD_DASHBOARD_COLLECTOR_ENABLED:-true}
      GOLD_DASHBOARD_REFRESH_SECONDS: ${GOLD_DASHBOARD_REFRESH_SECONDS:-15}
      GOLD_DASHBOARD_OFFSESSION_REFRESH_SECONDS: ${GOLD_DASHBOARD_OFFSESSION_REFRESH_SECONDS:-60}
      GOLD_AU0_ENABLED: ${GOLD_AU0_ENABLED:-true}
      GOLD_AUTD_ENABLED: ${GOLD_AUTD_ENABLED:-true}
      GOLD_XAU_ENABLED: ${GOLD_XAU_ENABLED:-true}
      GOLD_ETF_ENABLED: ${GOLD_ETF_ENABLED:-true}
      GOLD_AU0_URL: ${GOLD_AU0_URL:-https://hq.sinajs.cn/list=nf_AU0}
      GOLD_XAU_URL: ${GOLD_XAU_URL:-https://hq.sinajs.cn/list=hf_XAU}
      GOLD_ETF_URL: ${GOLD_ETF_URL:-https://qt.gtimg.cn/q=sh518880}
    depends_on:
      redis:
        condition: service_healthy

  content-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.content_main"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
      ACTIVE_SYMBOLS_KEY: moneyrush:active_symbols
      CONTENT_COLLECTOR_ENABLED: ${CONTENT_COLLECTOR_ENABLED:-true}
      CONTENT_COLLECTOR_POLL_INTERVAL_SECONDS: ${CONTENT_COLLECTOR_POLL_INTERVAL_SECONDS:-5}
      CONTENT_FETCH_MIN_INTERVAL_SECONDS: ${CONTENT_FETCH_MIN_INTERVAL_SECONDS:-10}
      CONTENT_FETCH_JITTER_SECONDS: ${CONTENT_FETCH_JITTER_SECONDS:-2}
      CONTENT_FETCH_COOLDOWN_BASE_SECONDS: ${CONTENT_FETCH_COOLDOWN_BASE_SECONDS:-1800}
      CONTENT_REPORT_REFRESH_SECONDS: ${CONTENT_REPORT_REFRESH_SECONDS:-43200}
      CONTENT_NEWS_REFRESH_SECONDS: ${CONTENT_NEWS_REFRESH_SECONDS:-1800}
      CONTENT_ANNOUNCEMENT_REFRESH_SECONDS: ${CONTENT_ANNOUNCEMENT_REFRESH_SECONDS:-7200}
      CONTENT_MARKET_NEWS_REFRESH_SECONDS: ${CONTENT_MARKET_NEWS_REFRESH_SECONDS:-900}
      CONTENT_REPORT_BACKFILL_DAYS: ${CONTENT_REPORT_BACKFILL_DAYS:-365}
      CONTENT_ANNOUNCEMENT_BACKFILL_PAGES: ${CONTENT_ANNOUNCEMENT_BACKFILL_PAGES:-5}
      CONTENT_NEWS_BACKFILL_MAX_ITEMS: ${CONTENT_NEWS_BACKFILL_MAX_ITEMS:-100}
      COLLECTOR_ENABLE_RUNTIME_DATA_REPAIR: ${COLLECTOR_ENABLE_RUNTIME_DATA_REPAIR:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  dragon-tiger-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.dragon_tiger_main"]
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
      DRAGON_TIGER_COLLECTOR_ENABLED: ${DRAGON_TIGER_COLLECTOR_ENABLED:-true}
      DRAGON_TIGER_COLLECTOR_POLL_INTERVAL_SECONDS: ${DRAGON_TIGER_COLLECTOR_POLL_INTERVAL_SECONDS:-300}
      DRAGON_TIGER_COLLECTION_START_HOUR_CHINA: ${DRAGON_TIGER_COLLECTION_START_HOUR_CHINA:-17}
      DRAGON_TIGER_COLLECTION_START_MINUTE_CHINA: ${DRAGON_TIGER_COLLECTION_START_MINUTE_CHINA:-10}
      DRAGON_TIGER_REQUEST_TIMEOUT_SECONDS: ${DRAGON_TIGER_REQUEST_TIMEOUT_SECONDS:-15}
      DRAGON_TIGER_REQUEST_RETRY_ATTEMPTS: ${DRAGON_TIGER_REQUEST_RETRY_ATTEMPTS:-3}
      DRAGON_TIGER_REQUEST_RETRY_BACKOFF_SECONDS: ${DRAGON_TIGER_REQUEST_RETRY_BACKOFF_SECONDS:-0.6}
      COLLECTOR_ENABLE_RUNTIME_DATA_REPAIR: ${COLLECTOR_ENABLE_RUNTIME_DATA_REPAIR:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  fund-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.fund_main"]
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
      REDIS_STREAM_KEY: moneyrush:symbol:commands
      ACTIVE_SYMBOLS_KEY: moneyrush:active_symbols
      ACTIVE_FUNDS_KEY: moneyrush:active_funds
      FUND_SNAPSHOT_KEY_PREFIX: moneyrush:fund:snapshot
      FUND_HOLDINGS_KEY_PREFIX: moneyrush:fund
      FUND_AUTO_LINK_STOCKS_KEY_PREFIX: moneyrush:fund:auto_link
      STOCK_FUNDS_KEY_PREFIX: moneyrush:stock
      FUND_COLLECTOR_ENABLED: ${FUND_COLLECTOR_ENABLED:-true}
      FUND_COLLECTOR_POLL_INTERVAL_SECONDS: ${FUND_COLLECTOR_POLL_INTERVAL_SECONDS:-3600}
      FUND_COLLECTOR_REQUEST_INTERVAL_SECONDS: ${FUND_COLLECTOR_REQUEST_INTERVAL_SECONDS:-1}
      COLLECTOR_ENABLE_RUNTIME_DATA_REPAIR: ${COLLECTOR_ENABLE_RUNTIME_DATA_REPAIR:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  macro-collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    command: ["python", "-m", "collector.macro_main"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-moneyrush}:${POSTGRES_PASSWORD:-moneyrush}@db:5432/${POSTGRES_DB:-moneyrush}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    depends_on:
      api:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then(() => process.exit(0)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db-data:
  redis-data:
